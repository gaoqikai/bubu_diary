<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <meta name="description" content="A beautiful and simple calculator app with keyboard support.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="calculator-container">
        <div class="calculator">
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="keypad">
                <button class="btn clear operator-special" data-action="clear">AC</button>
                <button class="btn delete operator-special" data-action="delete">DEL</button>
                <button class="btn operator operator-special" data-action="operator" data-value="%">%</button>
                <button class="btn operator" data-action="operator" data-value="÷">÷</button>
                
                <button class="btn number" data-value="7">7</button>
                <button class="btn number" data-value="8">8</button>
                <button class="btn number" data-value="9">9</button>
                <button class="btn operator" data-action="operator" data-value="×">×</button>
                
                <button class="btn number" data-value="4">4</button>
                <button class="btn number" data-value="5">5</button>
                <button class="btn number" data-value="6">6</button>
                <button class="btn operator" data-action="operator" data-value="-">−</button>
                
                <button class="btn number" data-value="1">1</button>
                <button class="btn number" data-value="2">2</button>
                <button class="btn number" data-value="3">3</button>
                <button class="btn operator" data-action="operator" data-value="+">+</button>
                
                <button class="btn number zero" data-value="0">0</button>
                <button class="btn number" data-value=".">.</button>
                <button class="btn equals" data-action="calculate">=</button>
            </div>
        </div>
    </main>

    <!-- Diary Trigger Button -->
    <button id="diary-btn" class="diary-trigger">一二布布的小笨日记</button>

    <!-- Diary Modal -->
    <div id="diary-modal" class="modal hidden">
        <div class="modal-content">
            <div class="diary-header">
                <h2>一二布布的小笨日记 📝</h2>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <button id="new-note-btn" class="btn-small">新建日记</button>
                    <button id="close-diary" class="close-btn">&times;</button>
                </div>
            </div>
            <div class="diary-body">
                <div class="notes-list" id="notes-list">
                    <!-- Note items will be dynamically injected here -->
                </div>
                <div class="note-editor">
                    <input type="hidden" id="note-id" />
                    <input type="text" id="note-title" placeholder="日记标题..." />
                    <textarea id="note-content" placeholder="今天发生了什么好玩的事呢..."></textarea>
                    <div class="editor-actions">
                        <button id="undo-btn" class="btn-small btn-secondary">撤销 (回滚)</button>
                        <button id="save-note-btn" class="btn-small">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Rollback Diff Modal -->
    <div id="diff-modal" class="modal hidden">
        <div class="modal-content" style="height: auto; max-height: 80vh;">
            <div class="diary-header">
                <h2>历史版本回滚确认 ⏪</h2>
            </div>
            <div class="diary-body" style="flex-direction: column; padding: 20px; overflow-y: auto;">
                <p style="margin-bottom: 10px; color: #8c6b5d;">你确定要恢复到上一个版本吗？以下是内容对比：</p>
                <div style="display: flex; gap: 20px;">
                    <div style="flex: 1; border: 2px solid #ffe0e6; padding: 10px; border-radius: 12px; background: #fff2eb;">
                        <h4 style="color: #4a332a; margin-bottom: 8px;">旧版本 (即将恢复)</h4>
                        <pre id="diff-old-content" style="white-space: pre-wrap; color: #e11d48; font-family: inherit; font-size: 1rem;"></pre>
                    </div>
                    <div style="flex: 1; border: 2px solid #ffe0e6; padding: 10px; border-radius: 12px; background: #fff;">
                        <h4 style="color: #4a332a; margin-bottom: 8px;">当前版本 (将被丢弃)</h4>
                        <pre id="diff-new-content" style="white-space: pre-wrap; color: #94a3b8; font-family: inherit; font-size: 1rem;"></pre>
                    </div>
                </div>
                <div class="editor-actions" style="border-top: none; margin-top: 20px;">
                    <button id="cancel-rollback-btn" class="btn-small btn-secondary">取消</button>
                    <button id="confirm-rollback-btn" class="btn-small" style="background: #e11d48; color: white;">确认回滚</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
